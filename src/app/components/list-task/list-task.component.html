<app-headerback></app-headerback>
<app-sideback></app-sideback>

<div id="page-wrapper">
  <div class="container-fluid">
    <div class="row bg-title">
      <div class="col-lg-3 col-md-4 col-sm-4 col-xs-12">
        <h4 class="page-title">Project Tasks</h4>
      </div>
    </div>

    <h2 class="text-center mb-4">Tasks for Project ID: {{ projectId }}</h2>

    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="card shadow p-4">
          <table class="table table-striped table-hover table-bordered shadow">
            <thead class="table-dark">
              <tr>
                <th>Task ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Position</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let task of tasks">
                <td>{{ task.id }}</td>
                <td>{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>{{ task.position }}</td>
                <td class="text-center">
                  <div class="btn-group">
                    <button (click)="editTask(task)" class="btn btn-warning btn-sm">✏ Edit</button>
                    <button (click)="deleteTask(projectId, task.id)" class="btn btn-danger btn-sm">🗑 Delete</button>
                    <button *ngIf="task.status !== 'COMPLETED'" 
                    (click)="markAsCompleted(task.id)" 
                    class="btn btn-success btn-sm">
                   ✔ Mark As Done
                   </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

          <div class="d-flex justify-content-end mt-3">
            <button routerLink="/list-project" class="btn btn-primary">⬅ Back to Projects</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<app-footerback></app-footerback>
